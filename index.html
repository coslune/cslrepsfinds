<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CSL FINDS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #191919; --card: #202020; --border: #2f2f2f; --text: #f4f4f5;
      --muted: #9ca3af; --accent: #2eaadc; --accent-hover: #1c99c6;
      --bg-tag: rgba(46, 170, 220, 0.15); --text-tag: #7dd3fc;
      --input-bg: #252525; --bg-seller: rgba(37, 99, 235, 0.2); --text-seller: #60a5fa;
    }
    body.light {
      --bg: #ffffff; --card: #fbfbfa; --border: #edece9; --text: #37352f;
      --muted: #787774; --accent: #2383e2; --accent-hover: #1a66b8;
      --bg-tag: #e8f4fe; --text-tag: #1d72d6; --input-bg: #f4f3f0;
      --bg-seller: #dbeafe; --text-seller: #1e40af;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; transition: background 0.2s; }

    /* NOUVELLE STRUCTURE HEADER */
    .header-container { position: sticky; top: 0; z-index: 10; background: var(--bg); border-bottom: 1px solid var(--border); }
    .topbar-fixed { display: flex; justify-content: space-between; align-items: center; padding: 12px 24px; }
    .search-sticky { display: flex; gap: 8px; padding: 0 12px 12px 12px; }
    
    input, select, button { border: 1px solid var(--border); background: var(--input-bg); color: var(--text); border-radius: 6px; padding: 8px; font-size: 0.85rem; }
    #searchInput { flex: 2; }
    #sellerSelect, #sortSelect { flex: 1; min-width: 0; }

    main { max-width: 1500px; margin: 0 auto; padding: 24px; }
    .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; }
    .product-card { background: var(--card); border: 1px solid var(--border); border-radius: 6px; cursor: pointer; }
    .product-images { display: flex; overflow-x: auto; scrollbar-width: none; background: rgba(0,0,0,0.02); }
    .product-images img { width: 100%; min-width: 100%; height: 140px; object-fit: cover; }
    .product-content { padding: 10px; }
    .hidden { display: none !important; }

    @media (max-width: 768px) {
      .products-grid { grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); }
      .product-images img { height: 110px; }
    }
  </style>
</head>
<body>

<header class="header-container">
  <div class="topbar-fixed">
    <div class="brand"><h1>CSL FINDS</h1></div>
    <button id="themeToggle">🌙</button>
  </div>
  <div class="search-sticky">
    <input type="text" id="searchInput" placeholder="Rechercher..." />
    <select id="sellerSelect"><option value="all">Vendeurs</option></select>
    <select id="sortSelect">
      <option value="default">Tri</option>
      <option value="az">A-Z</option>
      <option value="za">Z-A</option>
    </select>
  </div>
</header>

<main><div id="categoryContainer"></div></main>

<!-- Popup BBD -->
<div id="popupBBD" style="position: fixed; inset: 0; display: none; align-items: center; justify-content: center; z-index: 9999; backdrop-filter: blur(8px);">
  <div style="background: #121212; color: white; width: 85%; max-width: 320px; padding: 20px; border-radius: 14px; text-align: center; border: 1px solid #2eaadc;">
    <button id="btnExitPopupBbd" style="float:right; background:none; border:none; color:#fff; cursor:pointer;">✕</button>
    <h2>REJOINS BBDBUY !</h2>
    <p style="margin: 15px 0;">Obtiens ton pack de coupons exclusifs.</p>
    <a href="https://www.bbdbuyeu.com/register?inviteCode=hQUDCD" target="_blank" style="display:block; padding:10px; background:#2eaadc; color:#000; text-decoration:none; border-radius:6px;">S'INSCRIRE</a>
    <label style="display:block; margin-top:15px; font-size:11px;"><input type="checkbox" id="noMore"> Ne plus afficher</label>
  </div>
</div>

<script>
let products = [], originalProductsOrder = [];

document.addEventListener("DOMContentLoaded", () => {
  // Popup BBD forcée avec setProperty pour contourner le style inline
  if (!localStorage.getItem('hideBBD')) {
    setTimeout(() => {
      const p = document.getElementById('popupBBD');
      if (p) p.style.setProperty("display", "flex", "important");
    }, 1000);
  }
  document.getElementById('btnExitPopupBbd')?.addEventListener('click', closePopup);
  loadData();
});

function closePopup() {
  if (document.getElementById('noMore').checked) localStorage.setItem('hideBBD', 'true');
  document.getElementById('popupBBD').style.display = 'none';
}

// [Reste du code : loadData, renderProducts, filterAndSort, etc...]
// Assure-toi de garder tes fonctions de parsing et de rendu déjà existantes ici.
</script>
</body>
</html>
